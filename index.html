<!DOCTYPE html><html lang="en"><head>
<meta property="og:title" content="Hex Color — DevKit">
<meta property="og:description" content="Free online Hex Color tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/hex-color/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/hex-color/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Color tools: picker, shades, complementary, converter"><title>Hex Color Tools — DevKit Tools</title><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px;}
h1{font-size:20px;color:#f0f6fc;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:100%;margin-bottom:12px;}
input[type=color]{width:80px;height:80px;border:none;border-radius:8px;cursor:pointer;}
input[type=text]{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-family:monospace;font-size:14px;width:120px;}
input:focus{outline:none;border-color:var(--accent);}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.swatch{width:48px;height:48px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.swatch:hover{border-color:var(--accent);}
label{font-size:11px;color:var(--text);display:block;margin-bottom:4px;}
.conversions{margin-top:12px;font-size:13px;font-family:monospace;}
.conversions div{padding:4px 0;color:var(--text);}
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}</style></head><body><h1>🎨 Hex Color Tools</h1>
<div class="card"><div class="row"><input type="color" id="picker" value="#58a6ff"><div><label>HEX</label><input type="text" id="hex" value="#58a6ff"></div></div>
<div class="conversions" id="conversions"></div></div>
<div class="card"><h3 style="margin-bottom:8px;font-size:14px;">Shades</h3><div class="swatches" id="shades"></div><div style="margin-top:12px;"><h3 style="margin-bottom:8px;font-size:14px;">Complementary</h3><div class="swatches" id="complementary"></div></div></div>
<script>
'use strict';
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('')}
function hslToRgb(h,s,l){s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return{r:Math.round(f(0)*255),g:Math.round(f(8)*255),b:Math.round(f(4)*255)}}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h=0,s=0;const l=(max+min)/2;if(max!==min){const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);h=max===r?(g-b)/d+(g<b?6:0):max===g?(b-r)/d+2:(r-g)/d+4;h/=6}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}
function update(){const hex=document.getElementById('hex').value;document.getElementById('picker').value=hex;const{r,g,b}=hexToRgb(hex);const{h,s,l}=rgbToHsl(r,g,b);document.getElementById('conversions').innerHTML='<div>HEX: '+hex+'</div><div>RGB: rgb('+r+', '+g+', '+b+')</div><div>HSL: hsl('+h+', '+s+'%, '+l+'%)</div>';
const shades=[];for(let i=0;i<10;i++){const f=i/9;shades.push(rgbToHex(Math.round(r*(1-f)),Math.round(g*(1-f)),Math.round(b*(1-f))))}document.getElementById('shades').innerHTML=shades.map(s=>'<div class="swatch" style="background:'+s+'" onclick="pick(''+s+'')" title="'+s+'"></div>').join('');
const{h2}=rgbToHsl(r,g,b);const compRgb=hslToRgb((h2+180)%360,s,l);const compHex=rgbToHex(compRgb.r,compRgb.g,compRgb.b);document.getElementById('complementary').innerHTML='<div class="swatch" style="background:'+hex+'" title="'+hex+'"></div><div class="swatch" style="background:'+compHex+'" onclick="pick(''+compHex+'')" title="'+compHex+'"></div>'}
function pick(h){document.getElementById('hex').value=h;update()}
document.getElementById('picker').addEventListener('input',e=>{document.getElementById('hex').value=e.target.value;update()});
document.getElementById('hex').addEventListener('input',update);
update();
</script></body></html>
